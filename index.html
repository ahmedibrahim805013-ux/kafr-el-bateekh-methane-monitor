<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غاز كفر البطيخ - الميثان والطقس</title>
  
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1e88e5">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    body { font-family: 'Cairo', sans-serif; margin:0; background:#0f172a; color:white; }
    .header { background: linear-gradient(135deg, #1e88e5, #1565c0); padding:20px; text-align:center; }
    .container { max-width: 1200px; margin: auto; padding:15px; }
    .map { height: 520px; border-radius: 15px; }
    .card { background:#1e2937; border-radius:15px; padding:20px; margin-bottom:20px; }
    .high { color:#ef4444; font-weight:bold; }
    .medium { color:#f59e0b; font-weight:bold; }
    .low { color:#22c55e; font-weight:bold; }
  </style>
</head>
<body>

<div class="header">
  <h1>🌍 غاز كفر البطيخ</h1>
  <p>مراقبة الميثان • شبكة الغاز • الطقس الحي</p>
</div>

<div class="container">

  <!-- بيانات الطقس -->
  <div class="card">
    <h2>☀️ الطقس الحالي في كفر البطيخ</h2>
    <div id="weather-info" style="font-size:1.1rem;">جاري تحميل الطقس...</div>
  </div>

  <!-- الخريطة -->
  <div class="card">
    <div id="map" class="map"></div>
  </div>

  <!-- معلومات النقر -->
  <div id="info-card" class="card" style="display:none;">
    <h2>📍 تفاصيل النقطة المحددة</h2>
    <p><strong>اسم المبنى / المنطقة:</strong> <span id="name">-</span></p>
    <p><strong>نسبة الميثان:</strong> <span id="methane">-</span> ppm <span id="level"></span></p>
    <p><strong>حالة الاتصال:</strong> <span id="connected">-</span></p>
    <p><strong>قطر الأنبوب:</strong> <span id="diameter">-</span></p>
    <p><strong>الحالة:</strong> <span id="status">-</span></p>
    <hr>
    <p><strong>خط الطول:</strong> <span id="longitude">-</span></p>
    <p><strong>دائرة العرض:</strong> <span id="latitude">-</span></p>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// =============== تحميل الطقس (درجة الحرارة + سرعة الرياح + اتجاه الرياح) ===============
async function loadWeather() {
  try {
    const lat = 31.40;
    const lon = 31.75;
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,wind_direction_10m,weather_code`);
    const data = await res.json();
    const c = data.current;

    const directionText = getWindDirection(c.wind_direction_10m);

    document.getElementById('weather-info').innerHTML = `
      <strong>${c.temperature_2m}°C</strong> • 
      الرياح: ${c.wind_speed_10m} كم/س • 
      ${directionText}
    `;
  } catch (e) {
    document.getElementById('weather-info').innerHTML = "تعذر تحميل الطقس";
  }
}

function getWindDirection(deg) {
  const directions = ['شمال', 'شمال شرق', 'شرق', 'جنوب شرق', 'جنوب', 'جنوب غرب', 'غرب', 'شمال غرب'];
  return directions[Math.round(deg / 45) % 8];
}

// =============== الخريطة + الطبقات ===============
let map;

function initMap() {
  map = L.map('map').setView([31.40, 31.75], 14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  loadLayers();
}

async function loadLayers() {
  try {
    // 1. المباني
    const buildings = await (await fetch('buildings.geojson')).json();
    L.geoJSON(buildings, {
      style: { color: "#3b82f6", weight: 2, fillOpacity: 0.4 },
      onEachFeature: (feature, layer) => {
        layer.on('click', (e) => showInfo(feature, e.latlng));
      }
    }).addTo(map);

    // 2. شبكة الغاز
    const network = await (await fetch('network.geojson')).json();
    L.geoJSON(network, {
      style: { color: "#22c55e", weight: 6 },
      onEachFeature: (feature, layer) => {
        layer.on('click', (e) => showInfo(feature, e.latlng));
      }
    }).addTo(map);

    // 3. نقاط التسريب (دوائر حمراء عادية)
    const leaks = await (await fetch('leaks.geojson')).json();
    L.geoJSON(leaks, {
      pointToLayer: (feature, latlng) => {
        return L.circleMarker(latlng, {
          radius: 11,
          fillColor: "#ef4444",
          color: "#ffffff",
          weight: 3,
          fillOpacity: 0.9
        });
      },
      onEachFeature: (feature, layer) => {
        layer.on('click', (e) => showInfo(feature, e.latlng));
      }
    }).addTo(map);

  } catch (err) {
    alert("تأكد من رفع الملفات الثلاثة بالأسماء التالية بالظبط:\nbuildings.geojson\nnetwork.geojson\nleaks.geojson");
  }
}

// =============== عرض كل البيانات عند النقر ===============
function showInfo(feature, latlng) {
  const p = feature.properties || {};

  const methane = parseFloat(p.methane_ppm) || (1.5 + Math.random() * 3).toFixed(2);

  let levelHTML = '';
  if (methane >= 5) levelHTML = '<span class="high">(عالي - خطر)</span>';
  else if (methane >= 2.5) levelHTML = '<span class="medium">(متوسط - تحذير)</span>';
  else levelHTML = '<span class="low">(منخفض - آمن)</span>';

  document.getElementById('name').textContent = p.building_name || p.name || "منطقة غير مسماة";
  document.getElementById('methane').textContent = methane;
  document.getElementById('level').innerHTML = levelHTML;
  document.getElementById('connected').innerHTML = (p.connected === true || p.connected === "true") ? '✅ متصل بالشبكة' : '⚠️ غير متصل';
  document.getElementById('diameter').textContent = p.diameter ? p.diameter + " مم" : "غير محدد";
  document.getElementById('status').textContent = p.status || "طبيعي";

  // خط الطول ودائرة العرض
  document.getElementById('latitude').textContent = latlng.lat.toFixed(5);
  document.getElementById('longitude').textContent = latlng.lng.toFixed(5);

  document.getElementById('info-card').style.display = 'block';
}

// =============== تشغيل كل شيء ===============
window.onload = () => {
  initMap();
  loadWeather();
};
</script>

</body>
</html>
