<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غاز كفر البطيخ - مراقبة الميثان</title>
  
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1e88e5">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    body { font-family: 'Cairo', sans-serif; margin:0; background:#0f172a; color:white; }
    .header { background: linear-gradient(135deg, #1e88e5, #0f4c8a); padding:20px; text-align:center; }
    .map { height:520px; border-radius:12px; }
    .card { background:#1e2937; padding:20px; border-radius:16px; margin:15px 0; }
    .high { color:#ef4444; } .medium { color:#f59e0b; } .low { color:#22c55e; }
  </style>
</head>
<body>

<div class="header">
  <h1>🌍 غاز كفر البطيخ</h1>
  <p>مراقبة الميثان وشبكة الغاز</p>
</div>

<div class="card">
  <div id="map" class="map"></div>
</div>

<div id="info" class="card" style="display:none;">
  <h3>📍 التفاصيل</h3>
  <p><strong>الاسم:</strong> <span id="name">-</span></p>
  <p><strong>الميثان:</strong> <span id="methane">-</span> ppm <span id="level"></span></p>
  <p><strong>الاتصال:</strong> <span id="connect">-</span></p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

let map;

function initMap() {
  map = L.map('map').setView([31.40, 31.75], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  // تحميل الطبقات
  Promise.all([
    fetch('buildings.geojson').then(r => r.json()).catch(() => null),
    fetch('network.geojson').then(r => r.json()).catch(() => null),
    fetch('leaks.geojson').then(r => r.json()).catch(() => null)
  ]).then(([buildings, network, leaks]) => {
    
    if (buildings) {
      L.geoJSON(buildings, {
        style: {color: "#3b82f6", fillOpacity: 0.4},
        onEachFeature: (f, l) => l.on('click', () => showInfo(f))
      }).addTo(map);
    }

    if (network) {
      L.geoJSON(network, {
        style: {color: "#22c55e", weight: 6},
        onEachFeature: (f, l) => l.on('click', () => showInfo(f))
      }).addTo(map);
    }

    if (leaks) {
      L.geoJSON(leaks, {
        pointToLayer: (f, latlng) => L.circleMarker(latlng, {radius: 10, color: "#ef4444"}),
        onEachFeature: (f, l) => l.on('click', () => showInfo(f))
      }).addTo(map);
    }
  });
}

function showInfo(feature) {
  const p = feature.properties || {};
  const methane = p.methane_ppm || (1 + Math.random()*3).toFixed(2);
  
  document.getElementById('name').textContent = p.building_name || p.name || "منطقة";
  document.getElementById('methane').textContent = methane;
  document.getElementById('level').innerHTML = methane > 4 ? 
    '<span class="high"> (عالي - خطر)</span>' : 
    methane > 2.5 ? '<span class="medium"> (متوسط)</span>' : '<span class="low"> (آمن)</span>';
  
  document.getElementById('connect').innerHTML = (p.connected === true || p.connected === "true") ? 
    '✅ متصل بالشبكة' : '⚠️ غير متصل';
  
  document.getElementById('info').style.display = 'block';
}

window.onload = initMap;
</script>

</body>
</html>
