<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام تحليل الغاز والميثان - كفر البطيخ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
#map { height:60vh; width:95%; margin:auto; border-radius:10px; }

.panel {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
    margin-top:15px;
}

.card {
    background:#222;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>نظام مراقبة الغاز والميثان - كفر البطيخ</h2>

<div id="map"></div>
<div class="panel" id="info"></div>

<script>

// ================= MAP =================
var map = L.map('map').setView([31.35,31.28],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= WEATHER =================
function getWeather(){
    return {
        temp:(Math.random()*10+20).toFixed(1),
        pressure:(Math.random()*10+1005).toFixed(0),
        windSpeed:(Math.random()*8+2).toFixed(1),
        windDir:["شمال","جنوب","شرق","غرب"][Math.floor(Math.random()*4)],
        solar:(Math.random()*800+200).toFixed(0)
    }
}

// ================= RISK =================
function getRisk(ch4){
    if(ch4<1750) return {text:"آمن",color:"green"};
    if(ch4<1850) return {text:"تنبيه",color:"yellow"};
    if(ch4<1950) return {text:"خطر",color:"orange"};
    return {text:"خطر شديد",color:"red"};
}

// ================= PANEL =================
function updatePanel(lat,lon,ch4){
    var w = getWeather();
    var risk = ch4 ? getRisk(ch4).text : "غير متاح";

    document.getElementById("info").innerHTML = `
    <div class="card">📍 خط الطول: ${lon.toFixed(5)}</div>
    <div class="card">📍 دائرة العرض: ${lat.toFixed(5)}</div>
    <div class="card">⏰ الوقت: ${new Date().toLocaleTimeString('ar-EG')}</div>

    <div class="card">🌡️ الحرارة: ${w.temp} °C</div>
    <div class="card">☀️ الإشعاع: ${w.solar} W/m²</div>
    <div class="card">🌬️ الرياح: ${w.windSpeed} m/s (${w.windDir})</div>
    <div class="card">📊 الضغط: ${w.pressure} hPa</div>

    <div class="card">🟢 الميثان: ${ch4 || "—"} ppb</div>
    <div class="card">⚠️ مستوى الخطر: ${risk}</div>
    `;
}

// ================= PIPE STYLE =================
function pipeStyle(d){
    return {
        color:
            d==250?"red":
            d==180?"orange":
            d==125?"yellow":
            d==90?"green":"blue",

        weight:
            d==250?6:
            d==180?5:
            d==125?4:
            d==90?3:2
    }
}

// ================= GAS NETWORK =================
fetch("gas_network.geojson")
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        style:f=>pipeStyle(f.properties.diameter),
        onEachFeature:(f,l)=>{
            l.bindPopup("قطر الأنبوب: "+f.properties.diameter+" مم");
        }
    }).addTo(map);
});

// ================= BUILDINGS =================
fetch("buildings.geojson")
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        style:{color:"gray",fillOpacity:0.3}
    }).addTo(map);
});

// ================= LEAKS =================
fetch("leaks.geojson")
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        pointToLayer:(f,latlng)=>{
            var ch4=f.properties.CH4;
            var risk=getRisk(ch4);

            return L.circleMarker(latlng,{
                radius:8,
                fillColor:risk.color,
                color:"#000",
                weight:1,
                fillOpacity:0.9
            });
        },
        onEachFeature:(f,l)=>{
            var ch4=f.properties.CH4;
            var risk=getRisk(ch4);

            l.bindPopup(`
            نقطة تسريب<br>
            الميثان: ${ch4} ppb<br>
            الحالة: ${risk.text}
            `);

            l.on('click',e=>{
                updatePanel(e.latlng.lat,e.latlng.lng,ch4);
            });
        }
    }).addTo(map);
});

// ================= METHANE SURFACE =================
fetch("methane.geojson")
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        style:f=>{
            var ch4=f.properties.value;
            var risk=getRisk(ch4);

            return {
                fillColor:risk.color,
                fillOpacity:0.4,
                color:"#000",
                weight:1
            }
        },
        onEachFeature:(f,l)=>{
            var ch4=f.properties.value;
            var risk=getRisk(ch4);

            l.bindPopup(`
            الميثان: ${ch4} ppb<br>
            الحالة: ${risk.text}
            `);
        }
    }).addTo(map);
});

// ================= CLICK =================
map.on('click',e=>{
    updatePanel(e.latlng.lat,e.latlng.lng,null);
});

</script>

</body>
</html>
