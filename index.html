<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>طقس وغاز مركز كفر البطيخ - محافظة دمياط</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    body { font-family: 'Cairo', sans-serif; margin:0; background:#0f172a; color:white; }
    .header { background: linear-gradient(135deg, #1e88e5, #1565c0); padding:25px; text-align:center; }
    .container { max-width: 1200px; margin: auto; padding:15px; }
    #map { height: 520px; border-radius: 15px; margin-bottom: 20px; }
    .cards-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
    .card { 
      background: #1e2937; 
      border-radius: 12px; 
      padding: 18px; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .card h3 { margin: 0 0 10px 0; font-size: 1.1rem; }
    .card p { margin: 0; font-size: 1.4rem; font-weight: 600; }
    .high { color: #ef4444; }
    .medium { color: #f59e0b; }
    .low { color: #22c55e; }
  </style>
</head>
<body>

<div class="header">
  <h1>🌍 طقس وغاز مركز كفر البطيخ</h1>
  <p>نظام مراقبة الغاز الطبيعي والميثان - محافظة دمياط</p>
</div>

<div class="container">
  <div id="map"></div>
  
  <div class="cards-container" id="weather-cards"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
var map = L.map('map', {
    maxBounds: [[30.9, 30.8], [31.6, 32.1]],
    maxBoundsViscosity: 1.0
}).setView([31.35, 31.28], 11);

L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenTopoMap contributors'
}).addTo(map);

var marker = L.marker([31.35, 31.28]).addTo(map);

// دالة توليد أرقام عشوائية
function generateRandom(min, max) {
    return (Math.random() * (max - min) + min).toFixed(2);
}

// دالة اتجاه الرياح
function getWindDirection() {
    const dirs = ["شمال", "شمال شرقي", "شرق", "جنوب شرقي", "جنوب", "جنوب غربي", "غرب", "شمال غربي"];
    return dirs[Math.floor(Math.random() * dirs.length)];
}

// تحديث كل البيانات عند النقر
function updateData(lat, lon) {
    var now = new Date();

    // بيانات الميثان والغاز (عشوائية واقعية)
    const methane = (1.2 + Math.random() * 4.5).toFixed(2);
    const levelClass = methane > 5 ? "high" : methane > 2.5 ? "medium" : "low";
    const levelText = methane > 5 ? "(عالي - خطر)" : methane > 2.5 ? "(متوسط - تحذير)" : "(منخفض - آمن)";

    const diameters = [250, 180, 125, 90, 63];
    const diameter = diameters[Math.floor(Math.random() * diameters.length)];

    const connected = Math.random() > 0.4 ? "✅ متصل بالشبكة" : "⚠️ غير متصل";

    const data = [
        { label: "خط الطول", value: lon.toFixed(5), icon: "fa-map-marker-alt" },
        { label: "دائرة العرض", value: lat.toFixed(5), icon: "fa-map-marker" },
        { label: "الوقت", value: now.toLocaleTimeString('ar-EG'), icon: "fa-clock" },
        
        { label: "نسبة غاز الميثان", value: methane + " ppm <span class='" + levelClass + "'>" + levelText + "</span>", icon: "fa-gas-pump" },
        { label: "حالة الاتصال بالشبكة", value: connected, icon: "fa-plug" },
        { label: "قطر الأنبوب", value: diameter + " مم", icon: "fa-ruler-horizontal" },
        
        { label: "درجة الحرارة", value: generateRandom(18, 33) + "°C", icon: "fa-thermometer-half" },
        { label: "سرعة الرياح", value: generateRandom(2, 12) + " م/ث", icon: "fa-wind" },
        { label: "اتجاه الرياح", value: getWindDirection(), icon: "fa-compass" },
        { label: "الضغط الجوي", value: generateRandom(1005, 1022) + " hPa", icon: "fa-weight" },
        { label: "الإشعاع الشمسي", value: Math.floor(generateRandom(150, 950)) + " W/m²", icon: "fa-sun" },
        { label: "التبخر اليومي", value: generateRandom(0.1, 0.7) + " مم", icon: "fa-water" },
        { label: "هطول المطر", value: generateRandom(0, 3.5) + " مم", icon: "fa-cloud-rain" },
        { label: "الأشعة فوق البنفسجية", value: generateRandom(0.5, 8.5) + " UV", icon: "fa-radiation" }
    ];

    var cardsContainer = document.getElementById("weather-cards");
    cardsContainer.innerHTML = "";

    data.forEach(item => {
        let card = document.createElement("div");
        card.classList.add("card");
        card.innerHTML = `
            <h3><i class="fa ${item.icon}"></i> ${item.label}</h3>
            <p>${item.value}</p>
        `;
        cardsContainer.appendChild(card);
    });

    // تحريك العلامة
    marker.setLatLng([lat, lon]);
}

// النقر على الخريطة
map.on('click', function (e) {
    updateData(e.latlng.lat, e.latlng.lng);
});

// تحميل أولي
updateData(31.35, 31.28);
</script>

</body>
</html>
