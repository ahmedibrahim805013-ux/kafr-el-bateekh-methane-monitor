<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>كفر البطيخ GIS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height: 100vh; width:100%; }
.panel {
    position:absolute;
    top:10px;
    right:10px;
    background:white;
    padding:10px;
    border-radius:10px;
    width:220px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel" id="info">
اضغط على الخريطة
</div>

<script>

// الخريطة
var map = L.map('map').setView([31.35, 31.28], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// نقاط تسريب (محاكاة)
var leaks = [
    [31.36,31.30],
    [31.34,31.27],
    [31.33,31.29]
];

leaks.forEach(coord=>{
    L.circle(coord,{
        color:'red',
        radius:300
    }).addTo(map).bindPopup("نقطة تسريب غاز");
});

// شبكة (خطوط)
var pipeline = L.polyline([
    [31.36,31.30],
    [31.35,31.28],
    [31.33,31.29]
],{color:'blue'}).addTo(map);

// تحديث البيانات
function random(min,max){
 return (Math.random()*(max-min)+min).toFixed(2);
}

map.on('click',function(e){

document.getElementById("info").innerHTML=`
<b>الإحداثيات:</b><br>
${e.latlng.lat.toFixed(5)} , ${e.latlng.lng.toFixed(5)}<br><br>

<b>درجة الحرارة:</b> ${random(18,32)} °C<br>
<b>الرياح:</b> ${random(2,10)} m/s<br>
<b>الضغط:</b> ${random(1005,1020)} hPa
`;

});

</script>

</body>
</html>
