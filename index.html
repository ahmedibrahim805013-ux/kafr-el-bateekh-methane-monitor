<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غاز كفر البطيخ - مراقبة الميثان</title>
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1e88e5">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    body { font-family: 'Cairo', sans-serif; margin:0; background:#0f172a; color:white; }
    .header { background: linear-gradient(135deg, #1e88e5, #0f4c8a); padding:18px; text-align:center; }
    .container { max-width: 1200px; margin: auto; padding:15px; }
    .card { background:#1e2937; border-radius:16px; padding:20px; margin-bottom:20px; box-shadow:0 10px 25px rgba(0,0,0,0.4); }
    .map { height:520px; border-radius:16px; }
    .search { width:100%; padding:15px; font-size:1.1rem; border-radius:50px; border:none; margin-bottom:15px; }
    .info-card { background:#1e2937; border-radius:12px; padding:18px; margin-top:15px; }
    .high { color:#ef4444; font-weight:bold; }
    .medium { color:#f59e0b; font-weight:bold; }
    .low { color:#22c55e; font-weight:bold; }
  </style>
</head>
<body>

<div class="header">
  <h1>🌍 غاز كفر البطيخ</h1>
  <p>نظام مراقبة غاز الميثان وشبكة الغاز الطبيعي</p>
</div>

<div class="container">
  <input type="text" id="search" class="search" placeholder="ابحث عن مبنى أو منطقة...">

  <div class="card">
    <div id="map" class="map"></div>
  </div>

  <div id="info-panel" class="card info-card" style="display:none;">
    <h3>📍 تفاصيل الموقع</h3>
    <p><strong>اسم المبنى / المنطقة:</strong> <span id="building-name">-</span></p>
    <p><strong>نسبة غاز الميثان:</strong> <span id="methane-value">-</span> ppm 
       <span id="methane-level"></span></p>
    <p><strong>حالة الاتصال بالشبكة:</strong> <span id="connected-status"></span></p>
    <p><strong>قطر الأنبوب:</strong> <span id="pipe-diameter">-</span></p>
    <p><strong>حالة الشبكة:</strong> <span id="network-status">-</span></p>
    <p><strong>آخر تحديث:</strong> <span id="last-update">الآن</span></p>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
// ==================== تحميل الملفات ====================
let map;
let buildingsLayer, networkLayer, leaksLayer;

async function loadGeoJSONFiles() {
  try {
    const [buildingsRes, networkRes, leaksRes] = await Promise.all([
      fetch('buildings.geojson'),
      fetch('network.geojson'),
      fetch('leaks.geojson')
    ]);

    const buildingsData = await buildingsRes.json();
    const networkData = await networkRes.json();
    const leaksData = await leaksRes.json();

    // إضافة المباني
    buildingsLayer = L.geoJSON(buildingsData, {
      style: feature => ({
        color: "#3b82f6",
        weight: 2,
        fillOpacity: 0.35
      }),
      onEachFeature: (feature, layer) => {
        layer.on('click', () => showFeatureInfo(feature));
      }
    }).addTo(map);

    // إضافة شبكة الغاز
    networkLayer = L.geoJSON(networkData, {
      style: feature => ({
        color: "#22c55e",
        weight: 5,
        opacity: 0.9
      }),
      onEachFeature: (feature, layer) => {
        layer.on('click', () => showFeatureInfo(feature));
      }
    }).addTo(map);

    // إضافة نقاط التسريب
    leaksLayer = L.geoJSON(leaksData, {
      pointToLayer: (feature, latlng) => {
        return L.circleMarker(latlng, {
          radius: 9,
          fillColor: "#ef4444",
          color: "#fff",
          weight: 2,
          opacity: 1,
          fillOpacity: 0.9
        });
      },
      onEachFeature: (feature, layer) => {
        layer.on('click', () => showFeatureInfo(feature));
      }
    }).addTo(map);

  } catch (e) {
    console.error("خطأ في تحميل الملفات", e);
    alert("تأكد من رفع ملفات: buildings.geojson, network.geojson, leaks.geojson");
  }
}

// ==================== عرض المعلومات عند النقر ====================
function showFeatureInfo(feature) {
  const props = feature.properties || {};
  
  const methane = parseFloat(props.methane_ppm) || (1.5 + Math.random()*2.5).toFixed(2);
  let levelText = '';
  let levelClass = '';

  if (methane > 5) {
    levelText = '(عالي - خطر)';
    levelClass = 'high';
  } else if (methane > 2.5) {
    levelText = '(متوسط - تحذير)';
    levelClass = 'medium';
  } else {
    levelText = '(منخفض - آمن)';
    levelClass = 'low';
  }

  document.getElementById('building-name').textContent = props.building_name || props.name || "منطقة غير مسماة";
  document.getElementById('methane-value').textContent = methane;
  document.getElementById('methane-level').innerHTML = `<span class="${levelClass}">${levelText}</span>`;
  
  document.getElementById('connected-status').innerHTML = 
    props.connected === true || props.connected === "true" ? 
    '<span style="color:#22c55e">✅ متصل بالشبكة</span>' : 
    '<span style="color:#f59e0b">⚠️ غير متصل</span>';

  document.getElementById('pipe-diameter').textContent = props.diameter ? props.diameter + " مم" : "غير محدد";
  document.getElementById('network-status').textContent = props.status || "طبيعي";
  document.getElementById('last-update').textContent = "منذ لحظات";

  document.getElementById('info-panel').style.display = 'block';
}

// ==================== تهيئة الخريطة ====================
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([31.40, 31.75], 14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // النقر على أي مكان في الخريطة (لو مش على مبنى)
  map.on('click', (e) => {
    if (!document.getElementById('info-panel').style.display || document.getElementById('info-panel').style.display === 'none') {
      document.getElementById('building-name').textContent = "منطقة عامة";
      document.getElementById('methane-value').textContent = (1.8 + Math.random()*1.5).toFixed(2);
      document.getElementById('methane-level').innerHTML = '<span class="low">(منخفض - آمن)</span>';
      document.getElementById('connected-status').innerHTML = '<span style="color:#22c55e">✅ متصل</span>';
      document.getElementById('pipe-diameter').textContent = "غير محدد";
      document.getElementById('info-panel').style.display = 'block';
    }
  });
}

// تشغيل النظام
window.onload = () => {
  initMap();
  loadGeoJSONFiles();
};
</script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log('PWA Service Worker Registered'))
    .catch(err => console.log('SW Error', err));
}
</script>
</body>
</html>
