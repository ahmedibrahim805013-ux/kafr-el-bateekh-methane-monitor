<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غاز وطقس مركز كفر البطيخ - محافظة دمياط</title>
  
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1e88e5">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    body { font-family: 'Cairo', sans-serif; margin:0; background:#0f172a; color:white; }
    .header { background: linear-gradient(135deg, #1e88e5, #1565c0); padding:25px; text-align:center; }
    .container { max-width: 1250px; margin: auto; padding:15px; }
    #map { height: 550px; border-radius: 15px; margin-bottom: 20px; }
    .cards-container { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); 
      gap: 15px; 
    }
    .card { 
      background: #1e2937; 
      border-radius: 12px; 
      padding: 18px; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .card h3 { margin: 0 0 10px 0; font-size: 1.05rem; color: #94a3b8; }
    .card p { margin: 0; font-size: 1.4rem; font-weight: 600; }
    .high { color: #ef4444; }
    .medium { color: #f59e0b; }
    .low { color: #22c55e; }
  </style>
</head>
<body>

<div class="header">
  <h1>🌍 غاز وطقس مركز كفر البطيخ</h1>
  <p>نظام مراقبة الغاز الطبيعي والميثان - محافظة دمياط</p>
</div>

<div class="container">
  <div id="map"></div>
  <div class="cards-container" id="data-cards"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// =============== الخريطة ===============
let map;
let currentMarker = null;

function initMap() {
  map = L.map('map').setView([31.40, 31.75], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // النقر في أي مكان على الخريطة
  map.on('click', function(e) {
    if (currentMarker) map.removeLayer(currentMarker);
    
    currentMarker = L.marker(e.latlng).addTo(map);
    
    updateAllData(e.latlng.lat, e.latlng.lng);
  });

  loadGeoJSONLayers();
}

// =============== تحميل الطبقات الحقيقية ===============
async function loadGeoJSONLayers() {
  try {
    // المباني
    const buildings = await (await fetch('buildings.geojson')).json();
    L.geoJSON(buildings, {
      style: { color: "#3b82f6", weight: 2.5, fillOpacity: 0.35 },
      onEachFeature: (feature, layer) => {
        layer.on('click', (e) => {
          if (currentMarker) map.removeLayer(currentMarker);
          currentMarker = L.marker(e.latlng).addTo(map);
          updateAllData(e.latlng.lat, e.latlng.lng, feature.properties);
        });
      }
    }).addTo(map);

    // شبكة الغاز
    const network = await (await fetch('network.geojson')).json();
    L.geoJSON(network, {
      style: { color: "#22c55e", weight: 6 },
      onEachFeature: (feature, layer) => {
        layer.on('click', (e) => {
          if (currentMarker) map.removeLayer(currentMarker);
          currentMarker = L.marker(e.latlng).addTo(map);
          updateAllData(e.latlng.lat, e.latlng.lng, feature.properties);
        });
      }
    }).addTo(map);

    // نقاط التسريب
    const leaks = await (await fetch('leaks.geojson')).json();
    L.geoJSON(leaks, {
      pointToLayer: (feature, latlng) => {
        return L.circleMarker(latlng, {
          radius: 10,
          fillColor: "#ef4444",
          color: "#ffffff",
          weight: 3,
          fillOpacity: 0.85
        });
      },
      onEachFeature: (feature, layer) => {
        layer.on('click', (e) => {
          if (currentMarker) map.removeLayer(currentMarker);
          currentMarker = L.marker(e.latlng).addTo(map);
          updateAllData(e.latlng.lat, e.latlng.lng, feature.properties);
        });
      }
    }).addTo(map);

  } catch (err) {
    console.error(err);
    alert("تأكد من رفع الملفات: buildings.geojson , network.geojson , leaks.geojson");
  }
}

// =============== تحديث كل البيانات (الميثان + الطقس + الغاز) ===============
async function updateAllData(lat, lon, properties = {}) {
  const p = properties || {};

  // بيانات الميثان والغاز
  const methane = parseFloat(p.methane_ppm) || (1.4 + Math.random() * 4).toFixed(2);
  const levelClass = methane > 5 ? "high" : methane > 2.5 ? "medium" : "low";
  const levelText = methane > 5 ? "(عالي - خطر)" : methane > 2.5 ? "(متوسط - تحذير)" : "(منخفض - آمن)";

  const diameters = [250, 180, 125, 90, 63];
  const diameter = diameters[Math.floor(Math.random() * diameters.length)];

  const connected = (p.connected === true || p.connected === "true") ? 
                    "✅ متصل بالشبكة" : "⚠️ غير متصل بالشبكة";

  // بيانات الطقس (متغيرة حسب المكان)
  const temp = (18 + Math.random() * 15).toFixed(1);
  const windSpeed = (2 + Math.random() * 10).toFixed(1);
  const pressure = (1008 + Math.random() * 15).toFixed(0);
  const solar = Math.floor(150 + Math.random() * 750);
  const evap = (0.1 + Math.random() * 0.6).toFixed(2);
  const rain = (0 + Math.random() * 4).toFixed(1);
  const uv = (0.5 + Math.random() * 8).toFixed(1);

  const windDir = ["شمال", "شمال شرقي", "شرق", "جنوب شرقي", "جنوب", "جنوب غربي", "غرب", "شمال غربي"][Math.floor(Math.random()*8)];

  const now = new Date().toLocaleTimeString('ar-EG');

  const data = [
    { label: "اسم المبنى / المنطقة", value: p.building_name || p.name || "منطقة غير مسماة", icon: "fa-building" },
    { label: "نسبة غاز الميثان", value: `${methane} ppm <span class="${levelClass}">${levelText}</span>`, icon: "fa-gas-pump" },
    { label: "حالة الاتصال", value: connected, icon: "fa-plug" },
    { label: "قطر الأنبوب", value: `${diameter} مم`, icon: "fa-ruler-horizontal" },

    { label: "دائرة العرض", value: lat.toFixed(5), icon: "fa-map-marker" },
    { label: "خط الطول", value: lon.toFixed(5), icon: "fa-map-marker-alt" },
    { label: "التوقيت", value: now, icon: "fa-clock" },

    { label: "درجة الحرارة", value: generateRandom(18, 33) + "°C", icon: "fa-thermometer-half" },
        { label: "سرعة الرياح", value: generateRandom(2, 12) + " م/ث", icon: "fa-wind" },
        { label: "اتجاه الرياح", value: getWindDirection(), icon: "fa-compass" },
        { label: "الضغط الجوي", value: generateRandom(1005, 1022) + " hPa", icon: "fa-weight" },
        { label: "الإشعاع الشمسي", value: Math.floor(generateRandom(150, 950)) + " W/m²", icon: "fa-sun" },
        { label: "التبخر اليومي", value: generateRandom(0.1, 0.7) + " مم", icon: "fa-water" },
        { label: "هطول المطر", value: generateRandom(0, 3.5) + " مم", icon: "fa-cloud-rain" },
        { label: "الأشعة فوق البنفسجية", value: generateRandom(0.5, 8.5) + " UV", icon: "fa-radiation" }
    ];

  const container = document.getElementById("data-cards");
  container.innerHTML = "";

  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3><i class="fa ${item.icon}"></i> ${item.label}</h3>
      <p>${item.value}</p>
    `;
    container.appendChild(card);
  });
}

// بدء التشغيل
window.onload = () => {
  initMap();
  // عرض أولي
  updateAllData(31.40, 31.75);
};
</script>

</body>
</html>
